services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - LOG_LEVEL=debug
    volumes:
      - ./backend/src:/app/src
    command: npx tsx watch src/index.ts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile  # Create a basic Dockerfile for frontend if it doesn't exist
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
